<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>中華作品履修チェック</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
  h1 { text-align: center; margin-bottom: 20px; }
  .work { margin-bottom: 15px; padding: 10px; background: white; border-radius: 10px; }
  button { display: block; margin: 10px auto; padding: 10px 20px; font-size: 16px; }
  canvas { display: block; margin: 20px auto; border: 1px solid #ccc; }
</style>
</head>
<body>

<h1>私の中華作品履修チェック</h1>

<div id="app"></div>

<button onclick="generate()">画像を作る</button>
<button onclick="saveImage()">JPEGで保存</button>
<button onclick="shareImage()">共有する（iPhone向け）</button>

<canvas id="canvas" width="800" height="1200"></canvas>

<script>
// 作品リスト（author, title, items）
const works = [
  { title: "魔道祖師", author: "墨香銅臭", items: ["ドラマ（陳情令）", "アニメ", "小説"] },
  { title: "天官賜福", author: "墨香銅臭", items: ["アニメ", "小説"] },
  { title: "山河令", author: "作者B", items: ["ドラマ", "小説"] },
  { title: "陳情令外伝", author: "作者C", items: ["小説"] }
];

// チェックボックス生成
const app = document.getElementById("app");
works.forEach((work, i) => {
  const div = document.createElement("div");
  div.className = "work";

  let html = `<strong>${work.title}</strong>（${work.author}）<br>`;
  work.items.forEach((item, j) => {
    html += `
      <label>
        <input type="checkbox" id="w${i}-${j}">
        ${item}
      </label><br>
    `;
  });

  div.innerHTML = html;
  app.appendChild(div);
});

// 画像生成（選択済みのみ描画）
function generate() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let y = 60;

  works.forEach((work, i) => {
    const selectedItems = work.items.filter((_, j) => document.getElementById(`w${i}-${j}`).checked);

    if (selectedItems.length > 0) {
      // 作者
      ctx.font = "italic 20px sans-serif";
      ctx.fillStyle = "#555";
      ctx.fillText("作者：" + work.author, 50, y);
      y += 30;

      // 作品タイトル
      ctx.font = "bold 24px sans-serif";
      ctx.fillStyle = "#000";
      ctx.fillText(work.title, 50, y);
      y += 40;

      // 選択済み項目
      selectedItems.forEach(item => {
        ctx.font = "20px sans-serif";
        ctx.fillText("☑ " + item, 70, y);
        y += 30;
      });

      y += 20; // 作品間余白
    }
  });
}

// JPEG保存
function saveImage() {
  const canvas = document.getElementById("canvas");
  const link = document.createElement('a');
  link.download = 'my_chinese_checklist.jpg';
  link.href = canvas.toDataURL("image/jpeg", 0.92);
  link.click();
}

// iPhone向け共有
async function shareImage() {
  const canvas = document.getElementById("canvas");
  canvas.toBlob(async (blob) => {
    const file = new File([blob], "my_checklist.jpg", { type: "image/jpeg" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "中華作品履修チェック",
          text: "私のチェックリストを作ってみた📚🔥"
        });
      } catch (err) {
        alert("共有できませんでした: " + err);
      }
    } else {
      alert("このブラウザでは共有できません。長押しで保存してください。");
    }
  }, "image/jpeg", 0.92);
}
</script>

</body>
</html>
