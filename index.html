<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>中華作品チェックリスト</title>
<style>
  body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; padding: 20px; background: #fdfaf5; color: #333; }
  h1 { border-bottom: 2px solid #8b0000; padding-bottom: 10px; color: #8b0000; }
  details { margin-bottom: 10px; background: #fff; border: 1px solid #ddd; border-radius: 5px; padding: 5px; }
  summary { cursor: pointer; font-size: 18px; font-weight: bold; padding: 5px; outline: none; list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary::before { content: "▶ "; color: #8b0000; font-size: 14px; }
  details[open] > summary::before { content: "▼ "; }
  
  label { display: block; margin-left: 25px; margin-bottom: 8px; padding: 5px; border-bottom: 1px dashed #eee; cursor: pointer; font-size: 14px; }
  label:hover { background: #fff5f5; }
  .controls { margin-top: 20px; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #8b0000; color: white; border: none; border-radius: 5px; }
  button:hover { background: #a00000; }
  canvas { border: 1px solid #ccc; margin-top: 20px; max-width: 100%; background: #fff; }
</style>
</head>
<body>

<h1>🏮 中華作品チェックリスト</h1>
<div id="checklist"></div>

<div class="controls">
  <button id="generate">画像生成＆保存</button>
</div>

<div id="canvasContainer"></div>

<script>
const authors = [
  {
    name: "墨香銅臭",
    works: [
      { title: "天官賜福", items: ["小説 ▶邦訳版", "アニメ ▶一期", "ラジオドラマ ▶一季"] },
      { title: "魔道祖師", items: ["小説 ▶邦訳版", "アニメ ▶一期", "ドラマ ▶陳情令"] },
      { title: "人渣反派自救系統", items: ["小説 ▶繁体字版", "アニメ ▶穿書自救指南"] }
    ]
  },
  {
    name: "Priest",
    works: [
      { title: "山河令 (天涯客)", items: ["ドラマ ▶本編", "小説 ▶邦訳版"] },
      { title: "鎮魂", items: ["ドラマ ▶本編", "小説 ▶邦訳版"] }
    ]
  }
];

const checklistContainer = document.getElementById("checklist");

authors.forEach((author, aIdx) => {
  const authorDetails = document.createElement("details");
  const authorSummary = document.createElement("summary");
  authorSummary.textContent = author.name;
  authorDetails.appendChild(authorSummary);

  author.works.forEach((work, wIdx) => {
    const workDetails = document.createElement("details");
    const workSummary = document.createElement("summary");
    workSummary.textContent = work.title;
    workDetails.appendChild(workSummary);

    work.items.forEach((item, iIdx) => {
      const label = document.createElement("label");
      const groupName = `radio-${aIdx}-${wIdx}-${iIdx}`;

      label.appendChild(document.createTextNode(item + " ： "));

      const finished = createRadio(groupName, author.name, work.title, item, "finished");
      label.appendChild(finished);
      label.appendChild(document.createTextNode(" 完走 "));

      const reading = createRadio(groupName, author.name, work.title, item, "reading");
      label.appendChild(reading);
      label.appendChild(document.createTextNode(" 履修中 "));

      const none = createRadio(groupName, author.name, work.title, item, "none");
      none.checked = true;
      label.appendChild(none);
      label.appendChild(document.createTextNode(" 未選択"));

      workDetails.appendChild(label);
    });
    authorDetails.appendChild(workDetails);
  });
  checklistContainer.appendChild(authorDetails);
});

// 排他制御
document.querySelectorAll('details').forEach(target => {
  target.addEventListener('toggle', () => {
    if (target.open) {
      document.querySelectorAll('details').forEach(other => {
        if (other !== target && !other.contains(target)) {
          other.open = false;
        }
      });
    }
  });
});

function createRadio(name, author, work, item, status) {
  const radio = document.createElement("input");
  radio.type = "radio";
  radio.name = name;
  radio.dataset.author = author;
  radio.dataset.work = work;
  radio.dataset.item = item;
  radio.dataset.status = status;
  return radio;
}

// 角丸四角を描画する汎用関数
function drawRoundedRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.arcTo(x + width, y, x + width, y + radius, radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius);
  ctx.lineTo(x + radius, y + height);
  ctx.arcTo(x, y + height, x, y + height - radius, radius);
  ctx.lineTo(x, y + radius);
  ctx.arcTo(x, y, x + radius, y, radius);
  ctx.closePath();
}

document.getElementById("generate").addEventListener("click", () => {
  const canvasContainer = document.getElementById("canvasContainer");
  canvasContainer.innerHTML = "";

  const allChecked = Array.from(document.querySelectorAll('input[type="radio"]:checked'))
                          .filter(input => input.dataset.status !== "none");

  if (allChecked.length === 0) {
    alert("項目を1つ以上選択してください。");
    return;
  }

  // 高さの計算
  let currentYForCalc = 60;
  authors.forEach(author => {
    const authorItems = allChecked.filter(i => i.dataset.author === author.name);
    if (authorItems.length === 0) return;
    currentYForCalc += 50;
    const targetWorks = author.works.filter(work => authorItems.some(i => i.dataset.work === work.title));
    const isTwoColumn = targetWorks.length >= 2;
    
    let authorMaxY = currentYForCalc;
    let tempY = currentYForCalc;
    targetWorks.forEach((work, idx) => {
      const itemsCount = authorItems.filter(i => i.dataset.work === work.title).length;
      const h = 40 + (itemsCount * 40);
      if (isTwoColumn) {
        if (idx % 2 === 0) { tempY = currentYForCalc + h; } 
        else { authorMaxY = Math.max(tempY, currentYForCalc + h); }
      } else {
        currentYForCalc += h + 20;
        authorMaxY = currentYForCalc;
      }
    });
    currentYForCalc = authorMaxY + 50;
  });

  const canvas = document.createElement("canvas");
  canvas.width = 800;
  canvas.height = currentYForCalc;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#fffaf0"; 
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#8b0000";
  ctx.lineWidth = 10;
  ctx.strokeRect(5, 5, canvas.width-10, canvas.height-10);

  let currentY = 60;
  authors.forEach(author => {
    const authorItems = allChecked.filter(i => i.dataset.author === author.name);
    if (authorItems.length === 0) return;

    ctx.font = "bold 32px serif";
    ctx.fillStyle = "#8b0000";
    ctx.fillText("【 " + author.name + " 】", 40, currentY);
    currentY += 50;

    const targetWorks = author.works.filter(work => authorItems.some(i => i.dataset.work === work.title));
    const isTwoColumn = targetWorks.length >= 2;
    let maxYInAuthor = currentY;
    let startY = currentY;

    targetWorks.forEach((work, index) => {
      const workItems = authorItems.filter(i => i.dataset.work === work.title);
      let xOffset = 60;
      if (isTwoColumn) {
        const xIdx = index % 2;
        xOffset = 60 + (xIdx * 370);
        if (xIdx === 1) { currentY = startY; } 
        else if (index > 0) { currentY = maxYInAuthor + 30; startY = currentY; }
      }

      ctx.font = "bold 24px sans-serif";
      ctx.fillStyle = "#333";
      ctx.fillText("■ " + work.title, xOffset, currentY);
      currentY += 40;

      workItems.forEach(input => {
        const boxSize = 24;
        const boxX = xOffset + 30;
        const boxY = currentY - 20;
        const r = 5;

        ctx.lineWidth = 2;
        if (input.dataset.status === "finished") {
          ctx.fillStyle = "#006400";
          drawRoundedRect(ctx, boxX, boxY, boxSize, boxSize, r);
          ctx.fill();
          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(boxX + 5, boxY + 12);
          ctx.lineTo(boxX + 10, boxY + 18);
          ctx.lineTo(boxX + 19, boxY + 6);
          ctx.stroke();
          ctx.fillStyle = "#006400";
          ctx.font = "22px sans-serif";
          ctx.fillText(input.dataset.item, boxX + 35, currentY);
        } else {
          ctx.strokeStyle = "#ff8c00";
          drawRoundedRect(ctx, boxX, boxY, boxSize, boxSize, r);
          ctx.stroke();
          ctx.fillStyle = "#ff8c00";
          ctx.font = "22px sans-serif";
          ctx.fillText(input.dataset.item + " (履修中)", boxX + 35, currentY);
        }
        currentY += 40;
      });
      if (currentY > maxYInAuthor) maxYInAuthor = currentY;
    });
    currentY = maxYInAuthor + 50;
  });

  canvasContainer.appendChild(canvas);
  const link = document.createElement("a");
  link.download = "作品チェックリスト.jpg";
  link.href = canvas.toDataURL("image/jpeg", 0.8);
  link.innerHTML = "<br><button>画像をダウンロード保存</button>";
  canvasContainer.appendChild(link);
});
</script>
</body>
</html>
