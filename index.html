<!DOCTYPE html>

<meta charset="UTF-8">

<title>中華履修リスト</title>
<style>
  body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; padding: 14px; background: #fdfaf5; color: #333; }
  h1 { border-bottom: 2px solid #8b0000; padding-bottom: 10px; color: #8b0000; }
  #checklist { margin-top: 20px; }
  .author-details { margin-bottom: 15px; border: 2px solid #8b0000; border-radius: 8px; overflow: hidden; background: #fff; }
  .author-summary { cursor: pointer; font-size: 19px; font-weight: bold; padding: 12px; background: #f0ede9; outline: none; list-style: none; display: flex; align-items: center; }
  .author-summary::before { content: "👤 "; margin-right: 8px; }
  .work-details { margin: 5px 8px 8px 8px; border: 1px solid #ccc; border-radius: 5px; }
  .work-summary { cursor: pointer; font-size: 16px; font-weight: bold; padding: 8px; background: #fafafa; outline: none; list-style: none; color: #444; display: flex; align-items: center; }
  .work-summary::before { content: "✴︎ "; margin-right: 8px; font-size: 18px; color: #8b0000; }
  label { display: block; margin-left: 35px; margin-bottom: 2px; padding: 8px; border-bottom: 1px dashed #eee; cursor: pointer; font-size: 14px; color: #555; }
  label:hover { background: #fff5f5; }
  details[open] > summary::after { content: " ▼"; font-size: 12px; margin-left: auto; color: #8b0000; }
  details:not([open]) > summary::after { content: " ▶"; font-size: 12px; margin-left: auto; color: #999; }
  .controls { margin-top: 30px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; }
  .controls input[type="text"] { width: 100%; max-width: 300px; box-sizing: border-box; }
  #userNameInput { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; width: 100%; max-width: 300px; text-align: center; }
  button { padding: 12px 30px; font-size: 18px; cursor: pointer; background: #8b0000; color: white; border: none; border-radius: 50px; box-shadow: 0 4px 0 #5a0000; transition: 0.1s; }
  button:active { transform: translateY(3px); box-shadow: none; }
  canvas { border: 1px solid #ccc; margin-top: 20px; max-width: 100%; background: #fff; display: block; margin-left: auto; margin-right: auto; }

  @media (max-width: 768px) {
    body { padding: 8px; }
    .controls { padding: 0 10px; }
    .controls input[type="text"], #customWorkInput, #customItemInput { max-width: 100%; }
    .author-summary, .work-summary { font-size: 14px; }
    label { font-size: 12px; margin-left: 10px; }
    .work-details { margin: 3px 3px 6px 4px; }
    #customWorkInput, #customItemInput { width: 100% !important; margin-right: 0 !important; margin-bottom: 8px; }
    #addCustomItem { font-size: 13px; }
  }

  @media (max-width: 600px) {
    body { padding: 6px; }
    h1 { font-size: 18px; }
    .author-summary { font-size: 13px; padding: 8px; }
    .work-summary { font-size: 12px; padding: 6px 6px 6px 4px; }
    .work-details { margin: 2px 1px 6px 2px; }
    label { font-size: 11px; margin-left: 5px; }
    button { padding: 8px 12px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="controls" style="margin-top: 10px; margin-bottom: 20px; text-align: left; display: block; padding-left: 20px; justify-content: flex-start;">

  <input type="text" id="customItemInput" placeholder="メディアの種類" maxlength="40" style="width: 260px; margin-right: 8px;">
  <button id="addCustomItem" style="padding: 8px 14px; font-size: 14px;">リストにない項目を追加</button>

document.querySelectorAll('details').forEach(target => {
  target.addEventListener('toggle', () => {
    if (target.open) {
      document.querySelectorAll('details').forEach(other => {
        if (other !== target && !other.contains(target)) other.open = false;
      });
    }
  });
});

function createRadio(id, groupName, author, work, item, status) {
  const radio = document.createElement("input");
  radio.type = "radio";
  radio.name = groupName;
  radio.id = id;
  radio.dataset.author = author;
  radio.dataset.work = work;
  radio.dataset.item = item;
  radio.dataset.status = status;
  return radio;
}

  noneLabel.style.padding = "0";
  noneLabel.style.borderBottom = "none";
  noneLabel.style.cursor = "pointer";
  noneLabel.style.fontSize = isMobile ? "10px" : "14px";
  noneLabel.style.minWidth = isMobile ? "20px" : "50px";
  optionsContainer.appendChild(none);
  optionsContainer.appendChild(noneLabel);

  const deleteBtn = document.createElement("button");
  deleteBtn.textContent = "削除";
  deleteBtn.style.padding = "4px 8px";
  deleteBtn.style.fontSize = "11px";
  deleteBtn.style.cursor = "pointer";
  deleteBtn.addEventListener("click", () => container.remove());
  optionsContainer.appendChild(deleteBtn);

  container.appendChild(optionsContainer);
  document.getElementById("checklist").appendChild(container);

  document.getElementById("customItemInput").value = "";
}

document.getElementById("addCustomItem").addEventListener("click", addCustomItem);

function drawRoundedRectCompat(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.arcTo(x + width, y, x + width, y + radius, radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius);
  ctx.lineTo(x + radius, y + height);
  ctx.arcTo(x, y + height, x, y + height - radius, radius);
  ctx.lineTo(x, y + radius);
  ctx.arcTo(x, y, x + radius, y, radius);
  ctx.closePath();
}

function drawTextFit(ctx, text, x, y, maxWidth) {
  let fontSize = 22;
  const baseFont = ctx.font || '22px sans-serif';
  const fontFamily = baseFont.split(' ').slice(1).join(' ') || 'sans-serif';
  while (fontSize > 10) {
    ctx.font = `${fontSize}px ${fontFamily}`;
    if (ctx.measureText(text).width <= maxWidth) break;
    fontSize -= 1;
  }
  ctx.fillText(text, x, y);
}

document.getElementById("generate").addEventListener("click", () => {
  try {
    const canvasContainer = document.getElementById("canvasContainer");
    canvasContainer.innerHTML = "";
    const allChecked = Array.from(document.querySelectorAll('input[type="radio"]:checked')).filter(input => input.dataset.status !== "none");
    if (allChecked.length === 0) { alert("項目を選択してください"); return; }

    allChecked.forEach(radio => {
      const noteField = document.getElementById(`note-${radio.name}`);
      radio.dataset.note = noteField ? noteField.value.trim() : "";
    });

    const userName = document.getElementById("userNameInput").value || "匿名の中華好き";
    const dateObj = new Date();
    const dateStr = `作成日: ${dateObj.getFullYear()}/${dateObj.getMonth() + 1}/${dateObj.getDate()}`;

    const customAuthorMap = {};
    allChecked.forEach(radio => {
      if (!authors.some(a => a.name === radio.dataset.author)) {
        const auth = radio.dataset.author || "自分追加";
        const wk = radio.dataset.work || "カスタム";
        if (!customAuthorMap[auth]) customAuthorMap[auth] = {};
        if (!customAuthorMap[auth][wk]) customAuthorMap[auth][wk] = [];
        if (!customAuthorMap[auth][wk].includes(radio.dataset.item)) customAuthorMap[auth][wk].push(radio.dataset.item);
      }
    });

    const allAuthors = authors.map(a => ({ name: a.name, works: a.works }));
    Object.entries(customAuthorMap).forEach(([auth, works]) => {
      const arr = Object.entries(works).map(([w, items]) => ({ title: w, items }));
      allAuthors.push({ name: auth, works: arr });
    });

    // 高さ計算
    let calcY = 70;
    allAuthors.forEach(author => {
      const authorItems = allChecked.filter(i => i.dataset.author === author.name);
      if (authorItems.length === 0) return;
      calcY += 70;
      const targetWorks = author.works.filter(work => authorItems.some(i => i.dataset.work === work.title));
      const isTwoColumn = targetWorks.length >= 2 && window.innerWidth >= 760;
      let maxY = calcY;
      let startY = calcY;
      targetWorks.forEach((work, index) => {
        const workItems = authorItems.filter(i => i.dataset.work === work.title);
        let tempY = calcY;
        if (isTwoColumn) {
          if (index % 2 === 1) { tempY = startY; } 
          else if (index > 0) { tempY = maxY + 30; startY = tempY; }
        }
        tempY += 40 + (workItems.length * 40);
        if (tempY > maxY) maxY = tempY;
        if (!isTwoColumn) calcY = maxY + 20;
      });
      calcY = maxY + 80;
    });

    // フッターの高さを足す
    const totalHeight = calcY + 60;

    // ここでキャンバスを作成 (レスポンシブ)
    const canvas = document.createElement("canvas");
    const maxCanvasWidth = 800;
    const viewportWidth = Math.min(window.innerWidth - 40, maxCanvasWidth);
    canvas.width = Math.max(480, viewportWidth);
    canvas.height = totalHeight;
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#fffaf0"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#8b0000"; ctx.lineWidth = 10; ctx.strokeRect(5, 5, canvas.width-10, canvas.height-10);

    let currentY = 70;
    allAuthors.forEach(author => {
      const authorItems = allChecked.filter(i => i.dataset.author === author.name);
      if (authorItems.length === 0) return;
      ctx.font = "bold 32px serif"; ctx.fillStyle = "#8b0000"; ctx.strokeStyle = "#8b0000"; ctx.lineWidth = 2; ctx.setLineDash([10, 5]);
      const txt = "【 " + author.name + " 】";
      const tw = ctx.measureText(txt).width;
      const tx = (canvas.width / 2) - (tw / 2);
      ctx.beginPath(); ctx.moveTo(40, currentY - 10); ctx.lineTo(tx - 15, currentY - 10); ctx.stroke();
      ctx.fillText(txt, tx, currentY);
      ctx.beginPath(); ctx.moveTo(tx + tw + 15, currentY - 10); ctx.lineTo(canvas.width - 40, currentY - 10); ctx.stroke();
      ctx.setLineDash([]); currentY += 60;

      const targetWorks = author.works.filter(work => authorItems.some(i => i.dataset.work === work.title));
      const isTwoCol = targetWorks.length >= 2 && canvas.width >= 760;
      let maxYInA = currentY; let startY = currentY;
      targetWorks.forEach((work, index) => {
        const workItems = authorItems.filter(i => i.dataset.work === work.title);
        let xOff = 60;
        if (isTwoCol) {
          const xIdx = index % 2; xOff = 60 + (xIdx * 370);
          if (xIdx === 1) { currentY = startY; } 
          else if (index > 0) { currentY = maxYInA + 30; startY = currentY; }
        }
        ctx.font = "bold 24px sans-serif"; ctx.fillStyle = "#333"; ctx.fillText("■ " + work.title, xOff, currentY);
        currentY += 40;
        workItems.forEach(input => {
          const bX = xOff + 30; const bY = currentY - 20;
          const noteAppend = input.dataset.note ? ` (${input.dataset.note})` : "";
          if (input.dataset.status === "finished") {
            ctx.fillStyle = "#000000"; drawRoundedRectCompat(ctx, bX, bY, 24, 24, 5); ctx.fill();
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(bX+5, bY+12); ctx.lineTo(bX+10, bY+18); ctx.lineTo(bX+19, bY+6); ctx.stroke();
            ctx.fillStyle = "#000000";
            drawTextFit(ctx, input.dataset.item + noteAppend, bX + 35, currentY, 700);
          } else {
            ctx.strokeStyle = "#999999"; ctx.lineWidth = 2; drawRoundedRectCompat(ctx, bX, bY, 24, 24, 5); ctx.stroke();
            ctx.fillStyle = "#999999";
            drawTextFit(ctx, input.dataset.item + noteAppend, bX + 35, currentY, 700);
          }
          currentY += 40;
        });
        if (currentY > maxYInA) maxYInA = currentY;
      });
      currentY = maxYInA + 60;
    });

    // フッター装飾
    ctx.strokeStyle = "#8b0000";
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 3]);
    ctx.beginPath();
    ctx.moveTo(40, canvas.height - 60);
    ctx.lineTo(canvas.width - 40, canvas.height - 60);
    ctx.stroke();
    ctx.setLineDash([]);
    
    ctx.font = "bold 16px serif";
    ctx.fillStyle = "#8b0000";
    ctx.textAlign = "left";
    const footerX = 50;
    const footerYStart = canvas.height - 40;
    ctx.fillText(`✦ ${userName}`, footerX, footerYStart);
    ctx.font = "14px serif";
    ctx.fillStyle = "#666";
    ctx.fillText(dateStr, footerX, footerYStart + 22);
    
    // URL右端に表示
    ctx.textAlign = "right";
    ctx.font = "12px serif";
    ctx.fillStyle = "#000";
    ctx.fillText("黒字：履修済", canvas.width - 50, footerYStart);
    ctx.fillStyle = "#666";
    ctx.fillText("灰字：履修中", canvas.width - 50, footerYStart + 18);
    ctx.textAlign = "left"; 

    canvasContainer.appendChild(canvas);
    const link = document.createElement("a");
    link.download = "作品リスト.jpg"; link.href = canvas.toDataURL("image/jpeg", 0.8);
    link.innerHTML = "<br><button style='padding: 10px 25px; font-size: 16px; margin-bottom: 15px;'>画像を保存する</button>";
    canvasContainer.appendChild(link);
    
    // 説明テキスト
    const instructionText = document.createElement("p");
    instructionText.textContent = "画像を保存して、XやBlueskyなどに投稿してください";
    instructionText.style.marginTop = "15px";
    instructionText.style.marginBottom = "15px";
    instructionText.style.color = "#ffffff";
    instructionText.style.backgroundColor = "#8b0000";
    instructionText.style.fontWeight = "bold";
    instructionText.style.fontSize = "16px";
    instructionText.style.padding = "15px 20px";
    instructionText.style.borderRadius = "8px";
    instructionText.style.textAlign = "center";
    canvasContainer.appendChild(instructionText);
    
    // ボタンコンテナ
    const btnContainer = document.createElement("div");
    btnContainer.style.display = "flex";
    btnContainer.style.justifyContent = "center";
    btnContainer.style.gap = "10px";
    btnContainer.style.marginBottom = "20px";
    
    // Xシェアボタン
    const shareBtn = document.createElement("button");
    shareBtn.textContent = "𝕏に投稿";
    shareBtn.style.padding = "10px 20px";
    shareBtn.style.fontSize = "14px";
    shareBtn.style.background = "#000";
    shareBtn.style.color = "white";
    shareBtn.style.border = "none";
    shareBtn.style.borderRadius = "50px";
    shareBtn.style.cursor = "pointer";
    shareBtn.style.boxShadow = "0 4px 0 #5a0000";
    shareBtn.style.transition = "0.1s";
    shareBtn.addEventListener("click", () => {
      const text = `🏮中華履修チェックリスト🏮\n私は以下の作品を履修済です！\nhttp://china-checklist.vercel.app\n`;
      const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&hashtags=中華リスト`;
      window.open(twitterUrl, "_blank", "width=550,height=420");
    });
    btnContainer.appendChild(shareBtn);
    
    // Blueskyシェアボタン
    const blueskyBtn = document.createElement("button");
    blueskyBtn.textContent = "Blueskyに投稿";
    blueskyBtn.style.padding = "10px 20px";
    blueskyBtn.style.fontSize = "14px";
    blueskyBtn.style.background = "#1185fe";
    blueskyBtn.style.color = "white";
    blueskyBtn.style.border = "none";
    blueskyBtn.style.borderRadius = "50px";
    blueskyBtn.style.cursor = "pointer";
    blueskyBtn.style.boxShadow = "0 4px 0 #0956cc";
    blueskyBtn.style.transition = "0.1s";
    blueskyBtn.addEventListener("click", () => {
      const text = `🏮中華履修チェックリスト🏮\n私は以下の作品を履修済です！\nhttp://china-checklist.vercel.app\n\n#中華リスト`;
      const blueskyUrl = `https://bsky.app/intent/compose?text=${encodeURIComponent(text)}`;
      window.open(blueskyUrl, "_blank", "width=550,height=420");
    });
    btnContainer.appendChild(blueskyBtn);
    canvasContainer.appendChild(btnContainer);
  } catch (e) { alert("エラーが発生しました: " + e.message); }
});
</script>
