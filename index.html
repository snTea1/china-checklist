<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>中華作品チェックリスト</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f8f8f8; }
  details { margin-bottom: 10px; }
  summary { cursor: pointer; font-size: 20px; font-weight: bold; }
  label { display: block; margin-left: 20px; }
  button { margin-top: 15px; padding: 10px 15px; font-size: 16px; }
  canvas { border:1px solid #ccc; margin-top: 20px; max-width: 100%; }
</style>
</head>
<body>

<h1>中華作品チェックリスト</h1>
<div id="checklist"></div>
<button id="generate">Canvas生成＆JPEG保存</button>
<div id="canvasContainer"></div>

<script>
// データ
const authors = [
  {
    name: "墨香銅臭",
    works: [
      {
        title: "天官賜福",
        items: [
          "小説 ▶邦訳版", "小説 ▶繁体字版", "小説 ▶簡体字版", "小説 ▶完全版（晋江）",
          "アニメ ▶一期", "アニメ ▶二期", "アニメ ▶短編1", "アニメ ▶短編2", "アニメ ▶短編3",
          "ラジオドラマ ▶一季", "ラジオドラマ ▶二季", "ラジオドラマ ▶三季",
          "漫画 ▶邦訳版", "漫画 ▶繁体字版"
        ]
      },
      {
        title: "魔道祖師",
        items: [
          "小説 ▶邦訳版", "小説 ▶繁体字版", "小説 ▶晋江",
          "アニメ ▶一期", "アニメ ▶二期", "アニメ ▶三期",
          "ドラマ（陳情令） ▶本編", "ドラマ（陳情令） ▶生魂", "ドラマ（陳情令） ▶乱魄",
          "ラジオドラマ ▶本国版", "ラジオドラマ ▶日本版",
          "舞台 ▶邂逅編", "舞台 ▶湖洄編", "コミック"
        ]
      }
    ]
  },
  {
    name: "Priest",
    works: [
      {
        title: "七爷",
        items: ["小説 ▶晋江"]
      }
    ]
  },
  {
    name: "不明",
    works: [
      {
        title: "人渣反派自救系統",
        items: ["小説 ▶繁体字版", "小説 ▶邦訳版", "小説 ▶晋江", "アニメ ▶一期", "アニメ ▶二期"]
      }
    ]
  }
];

// チェックリスト生成
const checklistContainer = document.getElementById("checklist");
authors.forEach(author => {
  const authorDetails = document.createElement("details");
  authorDetails.open = true;
  const authorSummary = document.createElement("summary");
  authorSummary.textContent = author.name;
  authorDetails.appendChild(authorSummary);

  author.works.forEach(work => {
    const workDetails = document.createElement("details");
    const workSummary = document.createElement("summary");
    workSummary.textContent = work.title;
    workDetails.appendChild(workSummary);

    work.items.forEach(item => {
      const label = document.createElement("label");
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.dataset.author = author.name;
      checkbox.dataset.work = work.title;
      checkbox.dataset.item = item;
      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(" " + item));
      workDetails.appendChild(label);
    });

    authorDetails.appendChild(workDetails);
  });

  checklistContainer.appendChild(authorDetails);
});

// Canvas生成
document.getElementById("generate").addEventListener("click", () => {
  const canvasContainer = document.getElementById("canvasContainer");
  canvasContainer.innerHTML = ""; // 前の削除

  // 高さ計算
  let totalHeight = 40;
  authors.forEach(author => {
    totalHeight += 40;
    author.works.forEach(work => {
      const selectedItems = Array.from(document.querySelectorAll(`input[data-author="${author.name}"][data-work="${work.title}"]:checked`)).map(el => el.dataset.item);
      if (selectedItems.length === 0) return;
      totalHeight += 30;
      totalHeight += selectedItems.length * 28;
      totalHeight += 20;
    });
    totalHeight += 30;
  });

  const canvas = document.createElement("canvas");
  canvas.width = 1000;
  canvas.height = totalHeight;
  const ctx = canvas.getContext("2d");

  // 背景白
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 描画
  let y = 40;
  authors.forEach(author => {
    ctx.font = "bold 26px sans-serif";
    ctx.fillStyle = "#333";
    ctx.fillText(author.name, 50, y);
    y += 40;

    author.works.forEach(work => {
      const selectedItems = Array.from(document.querySelectorAll(`input[data-author="${author.name}"][data-work="${work.title}"]:checked`)).map(el => el.dataset.item);
      if (selectedItems.length === 0) return;

      ctx.font = "bold 24px sans-serif";
      ctx.fillStyle = "#000";
      ctx.fillText(work.title, 70, y);
      y += 30;

      selectedItems.forEach(item => {
        ctx.font = "20px sans-serif";
        ctx.fillText("☑ " + item, 90, y);
        y += 28;
      });

      y += 20;
    });

    y += 30;
  });

  canvasContainer.appendChild(canvas);

  // JPEG保存リンク
  const link = document.createElement("a");
  link.download = "作品チェックリスト.jpg";
  link.href = canvas.toDataURL("image/jpeg", 0.9);
  link.textContent = "JPEG保存";
  link.style.display = "block";
  link.style.marginTop = "10px";
  canvasContainer.appendChild(link);

  // SNS共有（対応ブラウザのみ）
  if (navigator.share) {
    const shareBtn = document.createElement("button");
    shareBtn.textContent = "SNSで共有";
    shareBtn.onclick = () => {
      canvas.toBlob(blob => {
        const file = new File([blob], "作品チェックリスト.jpg", { type: "image/jpeg" });
        navigator.share({
          files: [file],
          title: "作品チェックリスト",
          text: "私の中華作品チェックリストです！"
        });
      });
    };
    canvasContainer.appendChild(shareBtn);
  }
});
</script>

</body>
</html>
