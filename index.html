<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>中華作品チェックリスト</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f8f8f8; }
  details { margin-bottom: 10px; }
  summary { cursor: pointer; font-size: 20px; font-weight: bold; }
  label { display: block; margin-left: 20px; margin-bottom: 4px; }
  .status { margin-left: 10px; }
  button { margin-top: 15px; padding: 10px 15px; font-size: 16px; }
  canvas { border:1px solid #ccc; margin-top: 20px; max-width: 100%; }
</style>
</head>
<body>

<h1>中華作品チェックリスト</h1>
<div id="checklist"></div>
<button id="generate">Canvas生成＆JPEG保存</button>
<div id="canvasContainer"></div>

<script>
// データ例
const authors = [
  {
    name: "墨香銅臭",
    works: [
      { title: "天官賜福", items: ["小説 ▶邦訳版", "アニメ ▶一期", "ラジオドラマ ▶一季"] },
      { title: "魔道祖師", items: ["小説 ▶邦訳版", "アニメ ▶一期", "ドラマ ▶本編"] }
    ]
  },
  {
    name: "Priest",
    works: [
      { title: "七爷", items: ["小説 ▶晋江"] }
    ]
  }
];

// チェックリスト生成
const checklistContainer = document.getElementById("checklist");
authors.forEach(author => {
  const authorDetails = document.createElement("details");
  const authorSummary = document.createElement("summary");
  authorSummary.textContent = author.name;
  authorDetails.appendChild(authorSummary);

  author.works.forEach(work => {
    const workDetails = document.createElement("details");
    const workSummary = document.createElement("summary");
    workSummary.textContent = work.title;
    workDetails.appendChild(workSummary);

    work.items.forEach(item => {
      const label = document.createElement("label");
      label.textContent = item;

      const finished = document.createElement("input");
      finished.type = "checkbox";
      finished.dataset.author = author.name;
      finished.dataset.work = work.title;
      finished.dataset.item = item;
      finished.dataset.status = "finished";
      label.appendChild(finished);
      label.appendChild(document.createTextNode(" 読み終えた"));

      const reading = document.createElement("input");
      reading.type = "checkbox";
      reading.dataset.author = author.name;
      reading.dataset.work = work.title;
      reading.dataset.item = item;
      reading.dataset.status = "reading";
      label.appendChild(reading);
      label.appendChild(document.createTextNode(" 読んでる途中"));

      workDetails.appendChild(label);
    });

    authorDetails.appendChild(workDetails);
  });

  checklistContainer.appendChild(authorDetails);
});

// アコーディオン機能
function makeAccordion(selector) {
  document.querySelectorAll(selector).forEach(detail => {
    detail.addEventListener('toggle', e => {
      if (detail.open) {
        const parent = detail.parentNode;
        parent.querySelectorAll(':scope > details').forEach(other => {
          if (other !== detail) other.open = false;
        });
      }
    });
  });
}
makeAccordion('#checklist > details'); // 作者レベル
makeAccordion('#checklist details details'); // 作品レベル

// Canvas生成
document.getElementById("generate").addEventListener("click", () => {
  const canvasContainer = document.getElementById("canvasContainer");
  canvasContainer.innerHTML = "";

  let totalHeight = 40;
  authors.forEach(author => {
    let authorHasSelection = false;
    author.works.forEach(work => {
      const selectedItems = Array.from(document.querySelectorAll(`input[data-author="${author.name}"][data-work="${work.title}"]:checked`));
      if (selectedItems.length > 0) authorHasSelection = true;
    });
    if (!authorHasSelection) return;
    totalHeight += 40;
    author.works.forEach(work => {
      const selectedItems = Array.from(document.querySelectorAll(`input[data-author="${author.name}"][data-work="${work.title}"]:checked`));
      if (selectedItems.length === 0) return;
      totalHeight += 30 + selectedItems.length * 28 + 20;
    });
    totalHeight += 30;
  });

  const canvas = document.createElement("canvas");
  canvas.width = 1000;
  canvas.height = totalHeight;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let y = 40;
  authors.forEach(author => {
    let authorHasSelection = false;
    author.works.forEach(work => {
      const selectedItems = Array.from(document.querySelectorAll(`input[data-author="${author.name}"][data-work="${work.title}"]:checked`));
      if (selectedItems.length > 0) authorHasSelection = true;
    });
    if (!authorHasSelection) return;

    ctx.font = "bold 26px sans-serif";
    ctx.fillStyle = "#333";
    ctx.fillText(author.name, 50, y);
    y += 40;

    author.works.forEach(work => {
      const selectedItems = Array.from(document.querySelectorAll(`input[data-author="${author.name}"][data-work="${work.title}"]:checked`));
      if (selectedItems.length === 0) return;

      ctx.font = "bold 24px sans-serif";
      ctx.fillStyle = "#000";
      ctx.fillText(work.title, 70, y);
      y += 30;

      selectedItems.forEach(input => {
        if (input.dataset.status === "finished") {
          ctx.fillStyle = "green";
          ctx.fillText("☑ " + input.dataset.item, 90, y);
        } else if (input.dataset.status === "reading") {
          ctx.fillStyle = "orange";
          ctx.fillText("⬤ " + input.dataset.item, 90, y);
        }
        y += 28;
      });

      y += 20;
    });

    y += 30;
  });

  canvasContainer.appendChild(canvas);

  // JPEG保存リンク
  const link = document.createElement("a");
  link.download = "作品チェックリスト.jpg";
  link.href = canvas.toDataURL("image/jpeg", 0.9);
  link.textContent = "JPEG保存";
  link.style.display = "block";
  link.style.marginTop = "10px";
  canvasContainer.appendChild(link);

  // SNS共有
  if (navigator.share) {
    const shareBtn = document.createElement("button");
    shareBtn.textContent = "SNSで共有";
    shareBtn.onclick = () => {
      canvas.toBlob(blob => {
        const file = new File([blob], "作品チェックリスト.jpg", { type: "image/jpeg" });
        navigator.share({
          files: [file],
          title: "作品チェックリスト",
          text: "私の中華作品チェックリストです！"
        });
      });
    };
    canvasContainer.appendChild(shareBtn);
  }
});
</script>

</body>
</html>
